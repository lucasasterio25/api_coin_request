version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: crypto-postgres

    environment:
      POSTGRES_DB: crypto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres"
        ]

      interval: 10s
      timeout: 5s
      retries: 5
      
volumes:
  postgres_data:

  